name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Global settings for the whole runner machine
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true # Bypasses the Node 20 deprecation warning safely

jobs:
  run-tests:
    runs-on: ubuntu-latest 

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: my_app_test
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout project code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Upgraded to Node 24 to match the cloud runner rules
          cache: 'npm'
          cache-dependency-path: './rest_api/package-lock.json' # Points the cache tracker to your subfolder

      - name: Install packages
        run: npm ci
        working-directory: ./rest_api # Force-tells the robot to go inside the rest_api folder

      - name: Execute Jest Test Suite
        run: npm test
        working-directory: ./rest_api # Force-tells the robot to go inside the rest_api folder
