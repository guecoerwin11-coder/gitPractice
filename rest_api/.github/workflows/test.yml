name: Node.js CI/CD Pipeline

# This triggers the robot every time you push code or open a Pull Request
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest # The free virtual machine from 



    # Spin up a temporary Postgres database in the cloud for your tests!
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: my_app_test
          POSTGRES_PASSWORD: your_password # Make sure this matches your local fallback password!
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Step A: Copy your project files into the cloud machine
      - name: Checkout project code
        uses: actions/checkout@v4

      # Step B: Install Node.js version 20
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step C: Fast install all your project packages
      - name: Install packages
        run: npm ci

      # Step D: Run your 6 automated Jest tests!
      - name: Execute Jest Test Suite
        run: npm test
